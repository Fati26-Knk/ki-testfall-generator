version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: testcase-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173,http://localhost:3000
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    restart: unless-stopped
    networks:
      - testcase-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: testcase-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - testcase-network
    environment:
      - VITE_API_URL=http://localhost:8000

networks:
  testcase-network:
    driver: bridge
