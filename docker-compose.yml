version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: testcase-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:80
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - testcase-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: testcase-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - testcase-network

networks:
  testcase-network:
    driver: bridge
